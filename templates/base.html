<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- TÍTULO -->
    <title>{% block title %}Fazenda Recreio{% endblock %}</title>
    
    <!-- MANIFEST (PWA) -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <!-- TEMA PARA NAVEGADOR (PWA) -->
    <meta name="theme-color" content="#27ae60">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- ÍCONE PARA TELA INICIAL (iOS) -->
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logo-192.png') }}">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- FAVICON -->
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    
    <!-- REGISTRA O SERVICE WORKER (PWA) -->
    <script>
        // Registra o Service Worker para funcionar offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(function(registration) {
                    console.log('✅ Service Worker registrado com sucesso!');
                    console.log('📦 Escopo:', registration.scope);
                })
                .catch(function(error) {
                    console.log('❌ Falha ao registrar Service Worker:', error);
                });
        } else {
            console.log('ℹ️ Service Worker não é suportado neste navegador.');
        }

        // Detecta se o app está instalado (PWA)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            console.log('📱 App PWA detectado!');
        });

        // Detecta quando o app foi instalado
        window.addEventListener('appinstalled', function() {
            console.log('✅ App instalado com sucesso!');
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
